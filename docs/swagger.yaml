definitions:
  internal_controllers.AssignMenuRequest:
    properties:
      can_create:
        type: boolean
      can_delete:
        type: boolean
      can_edit:
        type: boolean
      can_view:
        type: boolean
    type: object
  internal_controllers.AssignRoleRequest:
    properties:
      role_id:
        type: string
    required:
    - role_id
    type: object
  internal_controllers.CreateMenuRequest:
    properties:
      icon:
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      parent_id:
        type: string
      path:
        type: string
      sort_order:
        type: integer
    required:
    - name
    type: object
  internal_controllers.CreatePermissionRequest:
    properties:
      action:
        maxLength: 50
        minLength: 2
        type: string
      description:
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
      resource:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - action
    - name
    - resource
    type: object
  internal_controllers.CreateRoleRequest:
    properties:
      description:
        type: string
      display_name:
        maxLength: 100
        minLength: 3
        type: string
      name:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - display_name
    - name
    type: object
  internal_controllers.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  internal_controllers.ResetPasswordRequest:
    properties:
      new_password:
        minLength: 6
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  internal_controllers.UpdateMenuRequest:
    properties:
      icon:
        type: string
      is_active:
        type: boolean
      name:
        maxLength: 100
        minLength: 2
        type: string
      parent_id:
        type: string
      path:
        type: string
      sort_order:
        type: integer
    required:
    - name
    type: object
  internal_controllers.UpdateRoleRequest:
    properties:
      description:
        type: string
      display_name:
        maxLength: 100
        minLength: 3
        type: string
      is_active:
        type: boolean
    required:
    - display_name
    type: object
  internal_controllers.ValidateTokenRequest:
    properties:
      token:
        type: string
    required:
    - token
    type: object
  user-management_internal_models.CreateUserRequest:
    properties:
      department:
        type: string
      email:
        type: string
      name:
        type: string
      nik:
        type: string
      password:
        minLength: 6
        type: string
      phone:
        type: string
      position:
        type: string
      role:
        enum:
        - admin
        - supervisor
        - warehouse_operator
        - viewer
        type: string
      username:
        type: string
    required:
    - email
    - name
    - password
    - role
    type: object
  user-management_internal_models.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  user-management_internal_models.LoginResponse:
    properties:
      expires_at:
        type: string
      token:
        type: string
      user:
        $ref: '#/definitions/user-management_internal_models.UserResponse'
    type: object
  user-management_internal_models.UpdateUserRequest:
    properties:
      department:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      nik:
        type: string
      phone:
        type: string
      position:
        type: string
      role:
        enum:
        - admin
        - supervisor
        - warehouse_operator
        - viewer
        type: string
      username:
        type: string
    type: object
  user-management_internal_models.UserResponse:
    properties:
      created_at:
        type: string
      department:
        type: string
      email:
        type: string
      is_active:
        type: boolean
      last_login_at:
        type: string
      name:
        type: string
      nik:
        type: string
      phone:
        type: string
      position:
        type: string
      role:
        type: string
      user_id:
        type: string
      username:
        type: string
    type: object
  user-management_internal_utils.Response:
    properties:
      code:
        type: string
      data: {}
      error:
        type: string
      message:
        type: string
      success:
        type: boolean
    type: object
